name: Supabase Migrations

on:
  push:
    branches: [main]
    paths:
      - "app/supabase/migrations/**"
  workflow_dispatch:
    # Permite rodar manualmente via Actions → Run workflow
    # Útil para aplicar migrations antigas que foram mergeadas antes deste
    # workflow existir.
    inputs:
      dry_run:
        description: "Dry run (mostra diff sem aplicar)"
        type: boolean
        required: false
        default: false

# Impede execuções paralelas — aplicar duas migrations ao mesmo tempo
# pode criar race conditions no banco.
concurrency:
  group: supabase-migrations
  cancel-in-progress: false

jobs:
  apply-migrations:
    name: Apply migrations to Supabase
    runs-on: ubuntu-latest
    timeout-minutes: 10

    # Ambiente protegido. Configure a lista de reviewers obrigatórios em
    # Repository Settings → Environments → production se quiser uma camada
    # de aprovação manual antes de aplicar.
    environment:
      name: production
      url: https://app.fieldmachine.com.br

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Verify required secrets
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          missing=()
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then missing+=("SUPABASE_ACCESS_TOKEN"); fi
          if [ -z "$SUPABASE_PROJECT_ID" ]; then missing+=("SUPABASE_PROJECT_ID"); fi
          if [ -z "$SUPABASE_DB_PASSWORD" ]; then missing+=("SUPABASE_DB_PASSWORD"); fi
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Secrets faltando: ${missing[*]}"
            echo "Configure em Settings → Secrets and variables → Actions"
            exit 1
          fi

      - name: Link Supabase project
        working-directory: ./app
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          supabase link --project-ref "${{ secrets.SUPABASE_PROJECT_ID }}"

      - name: Show pending migrations (dry run)
        if: ${{ github.event.inputs.dry_run == 'true' }}
        working-directory: ./app
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          echo "### Migrations pendentes (dry run)" >> $GITHUB_STEP_SUMMARY
          supabase migration list --linked >> $GITHUB_STEP_SUMMARY || true

      - name: Apply migrations
        if: ${{ github.event.inputs.dry_run != 'true' }}
        working-directory: ./app
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          echo "Aplicando migrations com supabase db push..."
          supabase db push --linked --password "$SUPABASE_DB_PASSWORD"

      - name: Summary
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "### ✅ Migrations aplicadas com sucesso" >> $GITHUB_STEP_SUMMARY
          else
            echo "### ❌ Falha ao aplicar migrations" >> $GITHUB_STEP_SUMMARY
            echo "Verifique os logs acima. Migrations antigas já aplicadas são ignoradas automaticamente." >> $GITHUB_STEP_SUMMARY
          fi

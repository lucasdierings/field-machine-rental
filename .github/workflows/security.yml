name: Security Checks

on:
  push:
    branches: [main, dev, 'codex/**', 'claude/**']
  pull_request:
    branches: [main, dev]
  schedule:
    # Run weekly on Monday at 8 AM UTC.
    - cron: '0 8 * * 1'

permissions:
  contents: read

jobs:
  dependency-check:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm
          cache-dependency-path: |
            app/package-lock.json
            site/package-lock.json

      - name: Audit dependencies (app, diagnostic until dependency hardening phase)
        working-directory: ./app
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Audit dependencies (site, diagnostic until dependency hardening phase)
        working-directory: ./site
        run: npm audit --audit-level=high
        continue-on-error: true
